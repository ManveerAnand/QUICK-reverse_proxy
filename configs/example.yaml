# Example configuration for the QUIC Reverse Proxy

server:
  # The address and port on which the proxy will listen for incoming QUIC connections
  address: ":443"
  # The path to the TLS certificate file
  cert_file: "./certs/server.crt"
  # The path to the TLS key file
  key_file: "./certs/server.key"
  quic:
    max_streams: 1000
    idle_timeout: 30s
    keep_alive: 15s

# Backend services configuration
backends:
  - name: "service1-http3"
    targets:
      - "localhost:8081"
    protocol: "h3" # Use HTTP/3 to communicate with backend
    tls_skip_verify: true # Skip TLS verification for self-signed backend certs
    weight: 1
    health_check:
      enabled: true
      path: "/health"
      interval: 10s
      timeout: 2s
  - name: "service2-http1"
    targets: 
      - "localhost:8082"
    protocol: "http" # Standard HTTP/1.1
    weight: 2
    health_check:
      enabled: false

routing:
  rules:
    - path: "/api/v1/*"
      backend: "service1-http3"
    - path: "/*"
      backend: "service2-http1"

# Telemetry settings
telemetry:
  metrics:
    enabled: true
    port: 9090
    path: "/metrics"
  tracing:
    enabled: false
    endpoint: "http://localhost:14268/api/traces"
  logging:
    level: "debug"
    format: "json"